name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: credisnap
          POSTGRES_PASSWORD: credisnap
          POSTGRES_DB: credisnap_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://credisnap:credisnap@localhost:5432/credisnap_test
      TWILIO_ACCOUNT_SID: test_sid
      TWILIO_AUTH_TOKEN: test_token
      TWILIO_WHATSAPP_NUMBER: +14155238886
      S3_BUCKET: test-bucket
      AWS_REGION: af-south-1
      ANTHROPIC_API_KEY: test_key
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run migrations
        run: |
          for f in db/migrations/*.sql; do
            psql "$DATABASE_URL" -f "$f"
          done

      - name: Run tests
        run: pytest tests/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check app/ tests/

  deploy:
    name: Deploy
    needs: [test, lint]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      # Placeholder — replace with your hosting platform deploy step.
      # Examples:
      #   Railway:  railway up --service credisnap
      #   Render:   curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}
      #   Fly.io:   flyctl deploy --remote-only
      - name: Deploy (placeholder)
        run: echo "Add your deploy command here"
